name: OCI Free Tier Instance Creation

on:
  workflow_dispatch:        # Manual trigger from GitHub UI
  schedule:
    - cron: '0 */6 * * *'  # Auto-restart every 6 hours

jobs:
  create-instance:
    runs-on: ubuntu-latest
    timeout-minutes: 350    # ~5h50m — stays within GitHub's 6h job limit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup OCI credentials and config
        run: |
          # Write the private key
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > oci_api_private_key.pem
          chmod 600 oci_api_private_key.pem

          # Write oci_config
          cat > oci_config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY }}
          region=${{ secrets.OCI_REGION }}
          key_file=${{ github.workspace }}/oci_api_private_key.pem
          EOF

          # Write oci.env
          cat > oci.env << EOF
          OCI_CONFIG=${{ github.workspace }}/oci_config
          OCT_FREE_AD=${{ secrets.OCT_FREE_AD }}
          DISPLAY_NAME=my-arm-ubuntu-instance
          OCI_COMPUTE_SHAPE=VM.Standard.A1.Flex
          SECOND_MICRO_INSTANCE=False
          REQUEST_WAIT_TIME_SECS=60
          SSH_AUTHORIZED_KEYS_FILE=${{ github.workspace }}/id_rsa.pub
          OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID=
          OPERATING_SYSTEM=Canonical Ubuntu
          OS_VERSION=22.04
          ASSIGN_PUBLIC_IP=false
          BOOT_VOLUME_SIZE=50
          NOTIFY_EMAIL=False
          EMAIL=
          EMAIL_PASSWORD=
          DISCORD_WEBHOOK=
          TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_USER_ID=${{ secrets.TELEGRAM_USER_ID }}
          EOF

      - name: Run OCI instance creation script
        run: python main.py
        timeout-minutes: 340

      - name: Notify completion
        if: always()
        run: |
          if [ -f "INSTANCE_CREATED" ]; then
            echo "✅ Instance was created successfully!"
          else
            echo "⏰ Job timed out - will retry on next scheduled run"
          fi
